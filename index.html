<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>
<title>Accura Industrial Logistics</title>
<link rel="icon" href="data:,">
<style>
body { background:#0b0b0b; }
.glass {
  background: rgba(40,40,40,0.6);
  backdrop-filter: blur(8px);
  border:1px solid rgba(255,255,255,0.08);
}
.glow-red {
  box-shadow: 0 0 20px rgba(255,0,0,0.6);
  border:1px solid rgba(255,0,0,0.8);
}
</style>
</head>
<body class="text-gray-200 font-sans">

<div class="p-4 border-b border-gray-800 flex items-center gap-4">
  <div class="text-2xl font-semibold tracking-widest text-red-600">ACCURA</div>
  <div class="text-sm text-gray-500">
    Industrial Logistics Control 
    <span class="text-gray-600 ml-2">v5.0.0</span>
  </div>
</div>

<div id="app" class="p-6 max-w-xl mx-auto"></div>

<script>

const APP_VERSION = "v5.0.0";
console.log("ACCURA Industrial Logistics", APP_VERSION);

const API_URL = "https://script.google.com/macros/s/AKfycbzxr7VATNJul8uPEeTaVKA28F8yySjZ_7EA-IkpG7evcq2ZkpuFOXFugB1xSBjuk1gH/exec";

let state = { page:"home", scanned:"", plannedLevel:"", plannedZone:"", gps:null };
let activeScanner = null;
let scanTimeout = null;

function render(){
  const app = document.getElementById("app");

  if(state.page==="home"){
    app.innerHTML = `
    <div class="space-y-6">
      <button onclick="openScanner()" class="w-full bg-red-600 p-6 rounded-2xl text-xl shadow-xl">
        SCAN CRATE
      </button>

      <div class="glass p-6 rounded-2xl">
        <div class="mb-3 text-lg">MANUAL ENTRY</div>
        <input id="manualBarcode" placeholder="Enter Crate ID"
          class="w-full p-3 bg-black border border-gray-700 rounded text-gray-300">
        <button onclick="useManualEntry()" class="mt-4 w-full bg-gray-800 p-3 rounded-xl">
          CONTINUE
        </button>
      </div>

      <button onclick="openDashboard()" class="w-full bg-gray-800 p-4 rounded-xl">
        VIEW DASHBOARD
      </button>

      <button onclick="openMap()" class="w-full bg-gray-800 p-4 rounded-xl">
        VIEW MAP
      </button>
    </div>`;
  }

  if(state.page==="scan"){
    app.innerHTML = `
      <div id="reader"></div>
      <button onclick="cancelScan()" class="mt-6 w-full bg-gray-800 p-3 rounded">
        CANCEL
      </button>`;
    startScanner();
  }

  if(state.page==="review"){
    app.innerHTML = `
    <div class="glass p-6 rounded-2xl space-y-4">
      <div class="text-red-500 text-xl">${state.scanned}</div>

      <label>Level</label>
      <select id="level" class="w-full p-3 bg-black border border-gray-700 rounded">
        <option>L1</option><option>L2</option><option>L3</option>
        <option>L4</option><option>L5</option><option>L6</option>
      </select>

      <label>Zone</label>
      <select id="zone" class="w-full p-3 bg-black border border-gray-700 rounded">
        <option>A1</option><option>A2</option><option>A3</option>
        <option>B1</option><option>B2</option><option>B3</option>
      </select>

      <label>Status</label>
      <select id="status" class="w-full p-3 bg-black border border-gray-700 rounded">
        <option>Unloaded</option>
        <option>Staged</option>
        <option>Installed</option>
      </select>

      <button onclick="submitData()" class="w-full bg-red-600 p-4 rounded-xl text-lg">
        SUBMIT
      </button>

      <button onclick="goHome()" class="w-full bg-gray-800 p-3 rounded">
        BACK
      </button>
    </div>`;

    setTimeout(()=>{
      if(state.plannedLevel) document.getElementById("level").value = state.plannedLevel;
      if(state.plannedZone) document.getElementById("zone").value = state.plannedZone;
    },100);
  }
}

render();

function goHome(){
  stopScanner();
  state.page="home";
  render();
}

function openScanner(){
  state.page="scan";
  render();
}

function cancelScan(){
  stopScanner();
  goHome();
}

function startScanner(){

  const formats = [
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39
  ];

  activeScanner = new Html5Qrcode("reader");

activeScanner.start(
  { facingMode: "environment" },
    {
      fps: 25,
      qrbox: { width: 320, height: 120 },
      formatsToSupport: formats,
      disableFlip: true
    },
    (decodedText) => {

      const clean = String(decodedText).trim();
      console.log("Scanned:", clean);

      stopScanner();

      state.scanned = clean;
      autoParse(clean);
      state.page = "review";
      render();
    }
  ).catch(err => {
    console.error("Scanner error:", err);
    alert("Camera failed. Use manual entry.");
    goHome();
  });

  scanTimeout = setTimeout(()=>{
    alert("Scan timed out.");
    stopScanner();
    goHome();
  }, 20000);
}

function stopScanner(){

  if(scanTimeout){
    clearTimeout(scanTimeout);
    scanTimeout = null;
  }

  if(activeScanner){
    try { activeScanner.stop(); } catch(e) {}
    try { activeScanner.clear(); } catch(e) {}
    activeScanner = null;
  }
}


function autoParse(code){
  let level = code.match(/L\d/i);
  let zone = code.match(/[A-Z]\d/i);
  state.plannedLevel = level ? level[0].toUpperCase():"";
  state.plannedZone = zone ? zone[0].toUpperCase():"";
}

function useManualEntry(){
  let val = document.getElementById("manualBarcode").value;
  if(!val) return;
  state.scanned = val;
  autoParse(val);
  state.page="review";
  render();
}

function submitData(){

  if(!state.scanned){
    alert("No crate ID detected.");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify({
      barcode: String(state.scanned),
      plannedLevel: state.plannedLevel,
      actualLevel: level.value,
      levelOverride: state.plannedLevel !== level.value,
      plannedZone: state.plannedZone,
      actualZone: zone.value,
      zoneOverride: state.plannedZone !== zone.value,
      status: status.value
    })
  });

  alert("Uploaded ✔");
  goHome();
}

</script>
</body>
</html>
