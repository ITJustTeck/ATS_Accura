
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>
<title>Accura Industrial Scanner</title>
<link rel="icon" href="data:,">
<style>
body { background:#0b0b0b; }
.glass {
  background: rgba(40,40,40,0.6);
  backdrop-filter: blur(8px);
  border:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body class="text-gray-200 font-sans">

<div class="p-4 border-b border-gray-800 flex items-center gap-4">
  <div class="text-2xl font-semibold tracking-widest text-red-600">ACCURA</div>
  <div class="text-sm text-gray-500">Industrial Logistics Control</div>
</div>

<div id="app" class="p-6 max-w-xl mx-auto"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz0dXTy1kL-4GMKyMXDtX1d75x6TZxMCD9k-TAPzszqHvAXnq0ripWRWEIXlWBgC-_p/exec";

let state = { page:"home", scanned:"", plannedLevel:"", plannedZone:"" };

function render(){
  const app = document.getElementById("app");

  if(state.page==="home"){
    app.innerHTML = `
    <div class="space-y-6">
      <button onclick="openScanner()" class="w-full bg-red-600 hover:bg-red-700 p-6 rounded-2xl text-xl tracking-wide shadow-xl">
        SCAN CRATE
      </button>

      <div class="glass p-6 rounded-2xl">
        <div class="mb-3 text-lg">SEARCH CRATE</div>
        <input id="searchInput" placeholder="Enter Crate ID"
        class="w-full p-3 bg-black border border-gray-700 rounded text-gray-300">
        <button onclick="searchCrate()" class="mt-4 w-full bg-gray-800 hover:bg-gray-700 p-3 rounded-xl">
        SEARCH
        </button>
      </div>
    </div>`;
  }

  if(state.page==="scan"){
    app.innerHTML = `<div id="reader"></div>
    <button onclick="goHome()" class="mt-6 w-full bg-gray-800 p-3 rounded">CANCEL</button>`;
    startScanner();
  }

  if(state.page==="review"){
    app.innerHTML = `
    <div class="glass p-6 rounded-2xl space-y-4">
      <div class="text-red-500 text-xl">${state.scanned}</div>

      <label>Level</label>
      <select id="level" class="w-full p-3 bg-black border border-gray-700 rounded">
        <option>L1</option><option>L2</option><option>L3</option>
        <option>L4</option><option>L5</option><option>L6</option>
      </select>

      <label>Zone</label>
      <select id="zone" class="w-full p-3 bg-black border border-gray-700 rounded">
        <option>A1</option><option>A2</option><option>A3</option>
        <option>B1</option><option>B2</option><option>B3</option>
      </select>

      <label>Status</label>
      <select id="status" class="w-full p-3 bg-black border border-gray-700 rounded">
        <option>Unloaded</option>
        <option>Staged</option>
        <option>Installed</option>
      </select>

      <button onclick="submitData()" class="w-full bg-red-600 p-4 rounded-xl text-lg">SUBMIT</button>
      <button onclick="goHome()" class="w-full bg-gray-800 p-3 rounded">BACK</button>
    </div>`;

    setTimeout(()=>{
      if(state.plannedLevel) level.value = state.plannedLevel;
      if(state.plannedZone) zone.value = state.plannedZone;
    },100);
  }

  if(state.page==="searching"){
    app.innerHTML = `<div class="text-center p-10 animate-pulse">Searching...</div>`;
  }
}
render();

function openScanner(){ state.page="scan"; render(); }
function goHome(){ state.page="home"; render(); }

function startScanner(){
  const scanner = new Html5Qrcode("reader");
  scanner.start({facingMode:"environment"}, {fps:10, qrbox:250},
  (code)=>{
    scanner.stop();
    state.scanned = code;
    autoParse(code);
    navigator.vibrate?.(200);
    state.page="review";
    render();
  });
}

function autoParse(code){
  let level = code.match(/L\d/i);
  let zone = code.match(/[A-Z]\d/i);
  state.plannedLevel = level ? level[0].toUpperCase():"";
  state.plannedZone = zone ? zone[0].toUpperCase():"";
}

async function submitData(){

  let payload = {
    barcode: state.scanned,
    plannedLevel: state.plannedLevel,
    actualLevel: level.value,
    levelOverride: state.plannedLevel !== level.value,
    plannedZone: state.plannedZone,
    actualZone: zone.value,
    zoneOverride: state.plannedZone !== zone.value,
    status: status.value,
    device: navigator.userAgent
  };

  try {

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    // Read response to prevent silent failure behavior
    const text = await res.text();
    console.log("Server response:", text);

    if (!res.ok) {
      alert("Upload failed (Server error " + res.status + ")");
      return;
    }

    alert("Uploaded ✔");

  } catch (err) {
    console.error(err);
    alert("Upload Failed (Network issue)");
  }

  goHome();
}


async function searchCrate(){
  let id = document.getElementById("searchInput").value;
  if(!id) return;
  state.page="searching"; render();

  try{
    let res = await fetch(API_URL + "?barcode=" + encodeURIComponent(id));
    let data = await res.json();

    if(!data.found){
      alert("No record found.");
      goHome(); return;
    }

    document.getElementById("app").innerHTML = `
    <div class="glass p-6 rounded-2xl space-y-4">
      <div class="text-red-500 text-xl">${id}</div>
      <div><strong>Last Scan:</strong> ${new Date(data.timestamp).toLocaleString()}</div>
      <div><strong>Level:</strong> ${data.level}</div>
      <div><strong>Zone:</strong> ${data.zone}</div>
      <div><strong>Status:</strong> ${data.status}</div>
      <button onclick="goHome()" class="w-full bg-gray-800 p-3 rounded mt-4">DONE</button>
    </div>`;

  }catch{
    alert("Search unavailable.");
    goHome();
  }
}
</script>
</body>
</html>
